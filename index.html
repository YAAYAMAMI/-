<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神山コレクション</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>神山コレクション</h1>

      <section id="start-screen" class="card">
        <h2>キャラを選んで1年間育成しよう</h2>
        <p>4人の同級生から1人を選んでスタートします。</p>
        <div id="character-list" class="character-list"></div>
      </section>

      <section id="game-screen" class="card hidden">
        <div class="top-row">
          <div>
            <h2 id="selected-name"></h2>
            <p id="day-label"></p>
          </div>
          <div class="button-row">
            <button id="save-btn" type="button">セーブ</button>
            <button id="load-btn" type="button">ロード</button>
            <button id="restart-btn" type="button">最初から</button>
          </div>
        </div>

        <div class="pixel-wrap">
          <pre id="pixel-art" class="pixel-art"></pre>
          <div class="character-note" id="character-note"></div>
        </div>

        <div class="stats" id="stats"></div>

        <h3>今日の行動</h3>
        <div id="actions" class="actions"></div>

        <h3>イベントログ</h3>
        <ul id="event-log" class="event-log"></ul>
      </section>

      <section id="result-screen" class="card hidden">
        <h2>1年間おつかれさま！</h2>
        <p id="result-summary"></p>
        <div id="result-stats" class="stats"></div>
        <button id="play-again-btn" type="button">もう一度プレイ</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
